<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KILLER KING VIP DATABASE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #050813;
            --bg-card: #0f1424;
            --primary: #0099ff;
            --primary-hover: #007acc;
            --accent: #00d4ff;
            --text-main: #ffffff;
            --text-sub: #8a9bbd;
            --border: #1c253b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #16203c 0%, var(--bg-body) 60%);
        }

        .app-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; position: relative; }

        .logo-wrapper { margin: 20px 0 15px; position: relative; }
        .logo-circle {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, #000, #111);
            border: 2px solid var(--primary);
            box-shadow: 0 0 25px rgba(0,153,255,0.4);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Rajdhani'; font-size: 2.5rem; font-weight: 700;
            color: var(--text-main); z-index: 2;
        }
        .logo-circle::after {
            content: ''; position: absolute; inset: -5px;
            border-radius: 50%; border: 1px solid rgba(0,153,255,0.2);
            animation: pulseRing 2s infinite;
        }
        @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }

        .title-box { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Rajdhani'; font-size: 1.8rem; margin: 0; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .arrows { color: var(--text-sub); font-size: 1.2rem; letter-spacing: -2px; }
        .subtitle { font-size: 1.4rem; font-weight: 600; margin: 0; color: var(--text-main); }
        .tagline { font-size: 0.8rem; color: var(--text-sub); margin-top: 8px; font-style: italic; opacity: 0.8; }

        .search-card {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 25px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        input {
            width: 100%; background: #090c17; border: 1px solid #2a3450;
            color: #fff; padding: 16px 15px; font-size: 1.1rem; border-radius: 8px;
            font-family: 'Poppins'; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,153,255,0.15); }
        input::placeholder { color: #4a5a7a; }

        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; font-size: 1rem; font-weight: 700; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Rajdhani'; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,153,255,0.3);
        }
        .btn-main:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .whatsapp-section { width: 100%; margin-top: 25px; text-align: center; }
        .wa-btn {
            display: flex; align-items: center; justify-content: center; width: 100%;
            background: linear-gradient(135deg, #1f2a40, #141b2d); border: 1px solid #2a3450;
            color: #fff; padding: 14px; border-radius: 12px; text-decoration: none;
            font-weight: 600; font-size: 0.95rem; transition: 0.3s;
        }
        .wa-btn i { font-size: 1.4rem; margin-right: 10px; color: var(--whatsapp); }

        #results-area { width: 100%; margin-top: 20px; }
        #full-loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background:#050813; z-index:9999; display:flex;
            align-items:center; justify-content:center; flex-direction:column;
        }

        .data-card {
            background: rgba(15,20,36,0.8); border-left: 4px solid var(--primary);
            border-radius: 8px; margin-bottom: 15px; overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .dc-header {
            background: rgba(0,153,255,0.1); padding: 10px 15px;
            font-size: 0.85rem; font-weight: 700; color: var(--primary);
            display: flex; justify-content: space-between;
        }
        .dc-body { padding: 15px; }
        .dc-row {
            display: flex; justify-content: space-between; margin-bottom: 8px;
            border-bottom: 1px dashed #2a3450; padding-bottom: 5px;
        }
        .dc-row:last-child { border: none; margin: 0; padding: 0; }
        .lbl { color: var(--text-sub); font-size: 0.8rem; font-weight: 500; }
        .val { color: #fff; font-size: 0.9rem; font-weight: 600; text-align: right; word-break: break-all; }
    </style>
</head>
<body>

    <div id="full-loader">
        <i class="fas fa-spinner fa-spin" style="font-size:6rem;color:#0099ff;"></i>
        <p style="margin-top:30px;font-size:2rem;color:#fff;font-family:'Rajdhani';letter-spacing:2px;">
            KILLER KING VIP<br>ELITE SEARCH ACTIVE...
        </p>
    </div>

    <div class="app-container">
        <div class="logo-wrapper">
            <div class="logo-circle">KK</div>
        </div>

        <div class="title-box">
            <h1>
                <span class="arrows"><i class="fas fa-chevron-left"></i><i class="fas fa-chevron-left"></i></span>
                KILLER KING OFFICIAL
                <span class="arrows"><i class="fas fa-chevron-right"></i><i class="fas fa-chevron-right"></i></span>
            </h1>
            <p class="subtitle">VIP Sim Database</p>
            <p class="tagline">Elite. Secure. No ads. Pure power.</p>
        </div>

        <div class="search-card">
            <div class="input-group">
                <input type="text" id="target" placeholder="Enter 11 Digit Mobile Number or CNIC">
            </div>
            <button class="btn-main" onclick="fetchData()">RESOLVE IDENTITY</button>
        </div>

        <div id="results-area"></div>

        <!-- ================== CHANNEL LINK YAHAN CHANGE KARO ================== -->
        <div class="whatsapp-section">
            <a href="https://whatsapp.com/channel/0029VbCN7Zg1NCrQBDWhsJ1r" target="_blank" class="wa-btn">
                <i class="fab fa-whatsapp"></i>
                <div class="wa-label">
                    <span class="wa-small">Join Our Elite Circle</span>
                    <span>KILLER KING CHANNEL</span>
                </div>
            </a>
        </div>
        <!-- ================================================================== -->

        <div class="footer">
            <div class="powered-text">Elite Data Services</div>
            <div class="brand-name">POWERED BY KILLER KING</div>
        </div>
    </div>

    <script>
        const fullLoader = document.getElementById('full-loader');
        const resArea = document.getElementById('results-area');
        const input = document.getElementById('target');

        window.addEventListener('load', () => {
            setTimeout(() => { fullLoader.style.display = 'none'; }, 1500);
        });

        async function fetchData() {
            let query = input.value.trim();
            if (query.length < 10) {
                alert("Please enter a valid 11 Digit Mobile Number or 13 Digit CNIC");
                return;
            }

            fullLoader.style.display = 'flex';
            resArea.innerHTML = '';

            try {
                // Number clean karo
                let phone = query.replace(/\D/g, '');
                if (phone.length === 11 && phone.startsWith('0')) {
                    phone = phone.substring(1);
                }

                const apiUrl = `https://apisaqib.vercel.app/api/v1/1001?phone=${phone}`;

                const response = await fetch(apiUrl);
                const data = await response.json();

                console.log("New API Response:", data);

                fullLoader.style.display = 'none';

                if (data && (data.success || data.status === "success" || data.data)) {
                    renderCards(data.data || data);
                } else {
                    resArea.innerHTML = `
                        <div style="text-align:center; color:#ffcc00; margin-top:30px; font-size:1.1rem; padding:20px;">
                            Data nahi mila is baar...<br><br>
                            Kisi aur number se try karen.
                        </div>`;
                }

            } catch (e) {
                console.error("Error:", e);
                fullLoader.style.display = 'none';
                resArea.innerHTML = `<div style="text-align:center; color:#ff4444; margin:30px 0;">Connection Error - Please try again</div>`;
            }
        }

        function renderCards(result) {
            let records = Array.isArray(result) ? result : (result ? [result] : []);
            
            if (records.length === 0) {
                resArea.innerHTML = `<div style="text-align:center; color:#ffcc00;">No records found</div>`;
                return;
            }

            let html = '';
            records.forEach((rec, idx) => {
                html += `
                <div class="data-card">
                    <div class="dc-header">
                        <span>RECORD #${idx + 1}</span>
                        <span><i class="fas fa-check-circle"></i> VERIFIED</span>
                    </div>
                    <div class="dc-body">
                `;

                for (const [key, val] of Object.entries(rec)) {
                    if (['status', 'success', 'message'].includes(key.toLowerCase())) continue;
                    
                    const displayKey = key.replace(/_/g, ' ').toUpperCase();
                    const displayVal = val !== null && val !== undefined ? val : 'N/A';
                    
                    html += `
                        <div class="dc-row">
                            <span class="lbl">${displayKey}</span>
                            <span class="val">${displayVal}</span>
                        </div>
                    `;
                }

                html += `</div></div>`;
            });

            resArea.innerHTML = html;
        }

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") fetchData();
        });
    </script>
</body>
</html>
